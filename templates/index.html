<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Household Management System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: linear-gradient(120deg,#e0eafc,#cfdef3);
    min-height:100vh;
}

.card{
    border:none;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.hidden{ display:none; }

.list-group-item{
    border-radius:10px;
    margin-bottom:8px;
}
</style>
</head>

<body>

<div class="container py-4">

<h2 class="text-center mb-4">Household Management System</h2>

<!-- AUTH SECTION -->
<div class="row justify-content-center">
<div class="col-md-5">

<!-- LOGIN -->
<div id="loginBox" class="card p-4">

<h4 class="text-center">Login</h4>

<input id="loginUsername" class="form-control mb-2" placeholder="Username">
<input id="loginPassword" type="password" class="form-control mb-2" placeholder="Password">

<button class="btn btn-primary w-100" onclick="login()">Login</button>

<p class="text-center mt-2">
No account? <a href="#" onclick="toggle()">Signup</a>
</p>

</div>

<!-- SIGNUP -->
<div id="signupBox" class="card p-4 hidden">

<h4 class="text-center">Signup</h4>

<input id="signupUsername" class="form-control mb-2" placeholder="Username">
<input id="signupPassword" type="password" class="form-control mb-2" placeholder="Password">

<button class="btn btn-success w-100" onclick="signup()">Signup</button>

<p class="text-center mt-2">
Already have account? <a href="#" onclick="toggle()">Login</a>
</p>

</div>

</div>
</div>

<hr>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

<div class="row">

<!-- TASKS -->
<div class="col-md-6">
<div class="card p-3">

<h4>Tasks</h4>

<input id="taskTitle" class="form-control mb-2" placeholder="Task Title">
<input id="taskDesc" class="form-control mb-2" placeholder="Description">

<button class="btn btn-success mb-2" onclick="addTask()">Add Task</button>
<button class="btn btn-dark mb-2" onclick="loadTasks()">Refresh</button>

<ul id="taskList" class="list-group"></ul>

</div>
</div>

<!-- EXPENSES -->
<div class="col-md-6">
<div class="card p-3">

<h4>Expenses</h4>

<input id="expenseName" class="form-control mb-2" placeholder="Expense Name">
<input id="expenseAmount" class="form-control mb-2" placeholder="Amount">
<input id="expensePaidBy" class="form-control mb-2" placeholder="Paid By">

<button class="btn btn-danger mb-2" onclick="addExpense()">Add Expense</button>
<button class="btn btn-dark mb-2" onclick="loadExpenses()">Refresh</button>

<ul id="expenseList" class="list-group"></ul>

</div>
</div>

</div>

</div>

</div>

<script>

const API = "http://127.0.0.1:5000";

/* ---------------- AUTH ---------------- */

function toggle(){
    loginBox.classList.toggle("hidden");
    signupBox.classList.toggle("hidden");
}

async function signup(){

    await fetch(`${API}/signup`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            username:signupUsername.value,
            password:signupPassword.value
        })
    });

    alert("Signup successful");
    toggle();
}

async function login(){

    await fetch(`${API}/login`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            username:loginUsername.value,
            password:loginPassword.value
        })
    });

    dashboard.classList.remove("hidden");
    loginBox.classList.add("hidden");

    loadTasks();
    loadExpenses();
}

/* ---------------- TASKS ---------------- */

async function addTask(){

    await fetch(`${API}/tasks`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            title:taskTitle.value,
            description:taskDesc.value,
            status:"pending"
        })
    });

    loadTasks();
}

async function updateTask(id){

    const title = prompt("Enter title");
    const desc = prompt("Enter description");
    const status = prompt("Enter status (pending/completed)");

    await fetch(`${API}/tasks/${id}`,{
        method:"PUT",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            title,
            description:desc,
            status
        })
    });

    loadTasks();
}

async function deleteTask(id){

    await fetch(`${API}/tasks/${id}`,{
        method:"DELETE"
    });

    loadTasks();
}

async function loadTasks(){

    const res = await fetch(`${API}/tasks`);
    const data = await res.json();

    taskList.innerHTML = "";

    data.forEach(t=>{

        const li = document.createElement("li");
        li.className = "list-group-item d-flex justify-content-between align-items-center";

        li.innerHTML = `
        <div>
            <b>${t.title}</b><br>
            ${t.description || ""}<br>
            <span class="badge bg-secondary">${t.status || "pending"}</span>
        </div>
        <div>
            <button class="btn btn-sm btn-warning me-1">Edit</button>
            <button class="btn btn-sm btn-danger">Delete</button>
        </div>
        `;

        li.querySelector(".btn-warning").onclick = () => updateTask(t.id);
        li.querySelector(".btn-danger").onclick = () => deleteTask(t.id);

        taskList.appendChild(li);
    });
}

/* ---------------- EXPENSES ---------------- */

async function addExpense(){

    await fetch(`${API}/expenses`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            expense_name:expenseName.value,
            amount:expenseAmount.value,
            paid_by:expensePaidBy.value
        })
    });

    loadExpenses();
}

async function updateExpense(id){

    const name = prompt("Expense name");
    const amount = prompt("Amount");
    const paid_by = prompt("Paid by");

    await fetch(`${API}/expenses/${id}`,{
        method:"PUT",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            expense_name:name,
            amount,
            paid_by
        })
    });

    loadExpenses();
}

async function deleteExpense(id){

    await fetch(`${API}/expenses/${id}`,{
        method:"DELETE"
    });

    loadExpenses();
}

async function loadExpenses(){

    const res = await fetch(`${API}/expenses`);
    const data = await res.json();

    expenseList.innerHTML = "";

    data.forEach(e=>{

        const li = document.createElement("li");
        li.className = "list-group-item d-flex justify-content-between align-items-center";

        li.innerHTML = `
        <div>
            <b>${e.expense_name}</b><br>
            ₹${e.amount}<br>
            ${e.paid_by}
        </div>
        <div>
            <button class="btn btn-sm btn-warning me-1">Edit</button>
            <button class="btn btn-sm btn-danger">Delete</button>
        </div>
        `;

        li.querySelector(".btn-warning").onclick = () => updateExpense(e.id);
        li.querySelector(".btn-danger").onclick = () => deleteExpense(e.id);

        expenseList.appendChild(li);
    });
}

</script>

</body>
</html>
